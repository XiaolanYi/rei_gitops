# argocd/apps/node-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rei-web-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xiaolanyi/rei_gitops.git
    targetRevision: main          # or HEAD, a tag, a commit sha, etc.
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres           
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true